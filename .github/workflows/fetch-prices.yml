name: Fetch daily prices

on:
  schedule:
    # UTC 22:30 = KST 다음날 07:30 (미국 장 마감 후), 미국 거래일 기준 월–금
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch prices from Twelve Data
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python scripts/fetch_prices.py

      - name: Fetch trials from ClinicalTrials.gov
        run: python scripts/fetch_trials.py
        continue-on-error: true   # 임상 수집 실패해도 주가 커밋은 진행

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/trials.json
          git diff --cached --quiet || git commit -m "chore: update data $(date -u +%F)"
          git push
